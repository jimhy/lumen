# Lumen 发版流水（F3 热更分发用，需求池 F3）。
#
# 触发：push 形如 `v0.2.0` 的 tag。
# 产物（挂到同名 GitHub Release）：
#   - Windows：dist\Lumen-Setup-<version>.exe（Inno Setup 安装包）——客户端
#     update.rs 查 `jimhy/lumen` 的 latest Release、下载本 .exe 完成自替换更新。
#   - Linux：Lumen-<version>-linux-x86_64.tar.gz（任意发行版通用）+ *.deb
#     （Debian/Ubuntu）。**实验性**：CI 绿只证明编译打包成功，GPU/渲染运行时
#     需真机验证；Linux 不走自更新（update.rs 在非 Windows 直接 UpToDate），
#     仅供手动下载安装。
#   - macOS：暂未纳入（打包脚本待补，后续单独接入）。
#
# 发布只走 GitHub（不发 Gitee，海风哥 2026-06-13 拍板）。Windows 部分是
# scripts\release.ps1 的 CI 等价物：改版本号 → release 构建 → Inno 打包 → 发
# Release；Linux 部分复用 package-linux.yml 的打包逻辑。
#
# 一次性发版流程：
#   1) 本地把 Cargo.toml 版本号 bump 到目标版本、提交。
#   2) git tag v<版本> && git push origin v<版本>
#   3) 本工作流自动构建打包：Windows 先建 Release 并附 exe，Linux 随后把
#      tarball / .deb 追加到同一 Release。
# （CI 会按 tag 再校正一次 Cargo.toml 版本号，纵使忘了 bump 也能保证二进制
#  内嵌的 CARGO_PKG_VERSION 与 tag 一致，否则客户端版本比较会失灵。）

name: release

on:
  push:
    tags:
      - "v*"

# 创建 Release 需要写权限。
permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: 检出
        uses: actions/checkout@v4

      - name: 安装 Rust（pin 1.97.0，见 ci.yml 工具链说明）
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Cargo 缓存
        uses: Swatinem/rust-cache@v2

      # tag 去掉 `v` 前缀作为版本号；并把 Cargo.toml 的 [workspace.package]
      # version 校正到该值（与 scripts\release.ps1 同款正则，只改行首
      # version，依赖内联 version 不误伤），保证 CARGO_PKG_VERSION == tag。
      - name: 推导版本号并校正 Cargo.toml
        id: ver
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "tag '${{ github.ref_name }}' 不是 v<major>.<minor>.<patch> 形态"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $cargo = 'Cargo.toml'
          $content = Get-Content -Raw -LiteralPath $cargo
          $updated = [regex]::Replace($content, '(?m)^version = "[^"]*"', "version = `"$version`"")
          Set-Content -LiteralPath $cargo -Value $updated -NoNewline
          Write-Host "版本号 → $version"

      - name: Release 构建
        run: cargo build --release

      - name: 安装 Inno Setup
        run: choco install innosetup --no-progress -y

      # 与 scripts\release.ps1 一致：iscc /DMyAppVersion=<v> installer\lumen.iss
      # → 产物 dist\Lumen-Setup-<v>.exe。
      - name: Inno Setup 打包
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "未找到 ISCC.exe：$iscc" }
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" "installer\lumen.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC 打包失败（exit $LASTEXITCODE）" }

      # 安装包 SHA256，附进 Release 说明供人工校验（客户端当前未强制校验）。
      - name: 计算 SHA256
        id: sha
        shell: pwsh
        run: |
          $installer = "dist\Lumen-Setup-${{ steps.ver.outputs.version }}.exe"
          if (-not (Test-Path $installer)) { throw "未找到安装包：$installer" }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer).Hash.ToLower()
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "SHA256：$hash"

      # 更新说明取自 annotated tag 的注释正文（发版时手写的面向用户中文
      # changelog）。客户端 update.rs 把它原样展示在「发现新版本」弹窗里，
      # 故**不能**用 SHA256/自动生成的 compare 链接等技术噪音。
      #
      # **经 GitHub API 读取**（不走本地 git）：actions/checkout 浅克隆会把
      # annotated tag 退化成轻量 tag（指向 commit），`git for-each-ref
      # %(contents)` 会误取 commit 消息（v0.1.4 实测踩过，即便加 fetch-tags
      # 仍如此）。API 直接读 tag 对象的 message，不受本地 tag 类型影响。
      - name: 提取更新说明（annotated tag，经 GitHub API）
        id: notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ref = gh api "repos/${{ github.repository }}/git/refs/tags/${{ github.ref_name }}" | ConvertFrom-Json
          $notes = if ($ref.object.type -eq 'tag') {
            (gh api "repos/${{ github.repository }}/git/tags/$($ref.object.sha)" | ConvertFrom-Json).message
          } else {
            "Lumen ${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($notes)) { $notes = "Lumen ${{ github.ref_name }}" }
          $path = Join-Path $env:RUNNER_TEMP "release_notes.txt"
          Set-Content -LiteralPath $path -Value $notes -Encoding utf8
          "path=$path" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "更新说明：`n$notes"

      # 创建/更新同名 Release 并附上安装包。
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Lumen ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          files: dist/Lumen-Setup-${{ steps.ver.outputs.version }}.exe

  # ── Linux：通用 tarball + .deb，追加到 Windows 已建好的同名 Release ──────────
  # needs: release —— 等 Windows job 把 Release 建好再追加资产（避免并发建 Release
  # 竞争），且本 job 失败不影响已发布的 Windows 包（Linux 是增量资产）。打包逻辑
  # 与 package-linux.yml 一致；ubuntu-22.04：glibc 2.35 + 无 t64 包名，兼容面最广。
  linux:
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装构建依赖（X11 / Wayland / GTK / xkb / 等宽字体）
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            pkg-config fonts-dejavu-core

      - uses: dtolnay/rust-toolchain@1.97.0
      # 独立缓存 key，与 ci.yml 的笼统 Linux 缓存隔离（避免 24.04 glibc 2.39
      # 产物污染 22.04，见 package-linux.yml 注释）。
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-2204

      # tag 去 v 前缀作版本号，并校正根 Cargo.toml 行首 version（与 Windows job
      # 同款语义，保证二进制内嵌 CARGO_PKG_VERSION == tag）。
      - name: 推导版本号并校正 Cargo.toml
        id: ver
        run: |
          version="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag '$GITHUB_REF_NAME' 不是 v<major>.<minor>.<patch> 形态" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # 只改行首 version（workspace.package），内联依赖 version 不误伤。
          sed -i -E "s/^version = \"[^\"]*\"/version = \"$version\"/" Cargo.toml
          echo "版本号 → $version"

      - name: 构建 release 二进制
        run: cargo build --release -p lumen-app

      # 保底产物：通用 tarball（几乎不会失败）。命名带版本号，与 Windows 对齐。
      - name: 打通用 tarball
        run: |
          mkdir -p dist
          cp target/release/lumen dist/lumen
          cp README.md dist/ 2>/dev/null || true
          cat > dist/运行说明.txt <<'EOF'
          Lumen —— Linux 通用构建

          运行需系统安装以下运行库（按发行版选一条）：
            Debian/Ubuntu:
              sudo apt install libgtk-3-0 libxcb1 libxcb-render0 libxcb-shape0 \
                libxcb-xfixes0 libxkbcommon0 libxkbcommon-x11-0 libwayland-client0 \
                libvulkan1 libgl1 libegl1 fonts-dejavu-core
            Fedora:
              sudo dnf install gtk3 libxcb libxkbcommon libxkbcommon-x11 wayland-libs-client \
                vulkan-loader mesa-libGL mesa-libEGL dejavu-sans-mono-fonts
            Arch:
              sudo pacman -S gtk3 libxcb libxkbcommon libxkbcommon-x11 wayland \
                vulkan-icd-loader mesa ttf-dejavu

          然后：  chmod +x lumen && ./lumen
          配置/会话/历史落在 ~/.local/share/Lumen/（release）。
          EOF
          tar -czf "Lumen-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz" -C dist .
          ls -la "Lumen-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz"

      # Debian/Ubuntu 安装包（best-effort：cargo-deb 若失败不阻塞，仍发 tarball）。
      - name: 安装 cargo-deb
        run: cargo install cargo-deb --locked
        continue-on-error: true

      - name: 打 .deb（默认输出 target/debian/*.deb）
        id: deb
        run: cargo deb -p lumen-app --no-build
        continue-on-error: true

      # 把 Linux 产物追加到 Windows 已建好的同名 Release（--clobber：重发同 tag
      # 时覆盖旧资产）。tarball 必传（保底），.deb 存在才传。
      - name: 上传 Linux 产物到 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tarball="Lumen-${{ steps.ver.outputs.version }}-linux-x86_64.tar.gz"
          gh release upload "$GITHUB_REF_NAME" "$tarball" --clobber
          echo "已上传 tarball：$tarball"
          deb=$(ls target/debian/*.deb 2>/dev/null | head -n1 || true)
          if [ -n "$deb" ]; then
            gh release upload "$GITHUB_REF_NAME" "$deb" --clobber
            echo "已上传 .deb：$deb"
          else
            echo "::warning::未生成 .deb（cargo-deb 失败？），本次仅发布 tarball"
          fi
